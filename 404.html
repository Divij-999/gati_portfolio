<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0; url=/portfolio/" />
    <title>Redirecting...</title>
    <meta name="google-site-verification" content="google458a29fc96f27ca7" />
    <script>
      // ✅ Redirect for GitHub Pages React Router (no hash mode)
      const path = window.location.pathname;
      const redirectBase = "/";
      if (!path.includes(redirectBase)) {
        window.location.replace(redirectBase + "#" + path);
      }
    </script>
  </head>
  <body>
    <p>Redirecting to portfolio...</p>
  </body>
</html>
